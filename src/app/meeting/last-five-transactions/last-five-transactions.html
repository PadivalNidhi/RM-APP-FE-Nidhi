<div class="outer-box" style="background-color:ghostwhite">
    <div class="card anim-up">
      <div class="card-header">
        <h3 class="card-title-desc">
            Last 5 Transactions
        </h3>
      </div>
      <div>
        <div class="transaction-item" *ngFor="let transaction of transactions()">
            <span class="transaction-item-label" [ngClass]="{'transaction-item-label-red': transaction.transactionType === 'SELL', 'transaction-item-label-green': transaction.transactionType === 'BUY'}">
                {{ transaction.transactionType }}
            </span>
            <span class="transaction-item-label1">{{ transaction.stockName }}</span>
            <span class="transaction-item-label2">
                €{{ transaction.priceShare}} EUR
            </span>
        </div>
      </div>
    </div>
</div>
